<!DOCTYPE html>
<html lang="zh-CN">

<head>

<!-- 纯预览模式 - 需要网络加载外部资源 -->
<noscript>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; padding: 20px; }
        .offline-notice { background: #fef3cd; color: #856404; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
    </style>
    <div class="offline-notice">⚠️ 请启用 JavaScript 以查看此原型</div>
</noscript>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>微课视频 - 学生注册提示</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap"
        rel="stylesheet">

    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Vue 3 -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

    <!-- Tailwind Config -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#004fff', // 主色
                        secondary: '#10b981', // 强调色
                        'bg-gray': '#f5f7fa',
                        'card-orange-start': '#ff8e5d',
                        'card-orange-end': '#ff5246',
                    },
                    fontFamily: {
                        sans: ['Inter', 'Noto Sans SC', 'sans-serif'],
                    },
                    boxShadow: {
                        'ant': '0 4px 12px rgba(0, 0, 0, 0.08)',
                        'modal': '0 10px 30px rgba(0, 0, 0, 0.15)',
                    }
                }
            }
        }
    </script>

    <style>
        /* 自定义滚动条隐藏 */
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* 模拟手机外壳效果（仅在桌面端显示） */
        body {
            background-color: #e5e7eb;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Noto Sans SC', sans-serif;
        }

        #app {
            width: 100%;
            max-width: 414px;
            /* iPhone Max width */
            background-color: #f5f7fa;
            position: relative;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* 动画 */
        .fade-enter-active,
        .fade-leave-active {
            transition: opacity 0.3s ease;
        }

        .fade-enter-from,
        .fade-leave-to {
            opacity: 0;
        }

        .pop-enter-active,
        .pop-leave-active {
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .pop-enter-from,
        .pop-leave-to {
            opacity: 0;
            transform: scale(0.9);
        }
    </style>
</head>

<body>

    <div id="app">
        <!-- 1. 顶部状态栏区域 (蓝色背景) -->
        <header class="bg-primary text-white pt-2 pb-2 px-4 flex-none z-10">
            <!-- 模拟系统状态栏 -->
            <div class="flex justify-between items-center text-xs mb-3 font-medium opacity-90">
                <span>10:27</span>
                <div class="flex items-center gap-1.5">
                    <i class="fas fa-signal"></i>
                    <i class="fas fa-wifi"></i>
                    <i class="fas fa-battery-three-quarters text-sm"></i>
                </div>
            </div>

            <!-- 顶部导航 -->
            <div class="flex justify-between items-center h-11 relative">
                <div class="flex items-center gap-1 text-base font-medium">
                    <span>高三</span>
                    <i class="fas fa-caret-down text-sm opacity-80"></i>
                </div>

                <h1 class="absolute left-1/2 transform -translate-x-1/2 text-lg font-bold tracking-wide">微课视频</h1>

                <div class="text-xl opacity-90">
                    <i class="fas fa-history"></i>
                </div>
            </div>
        </header>

        <!-- 2. 学科选择栏 -->
        <div class="bg-white flex-none border-b border-gray-100">
            <div class="flex overflow-x-auto hide-scrollbar px-2 py-3 gap-6 text-[15px]">
                <div v-for="(subject, index) in subjects" :key="index"
                    class="whitespace-nowrap flex flex-col items-center gap-1 px-2 cursor-pointer transition-colors"
                    :class="activeSubject === index ? 'text-primary font-bold' : 'text-gray-600'"
                    @click="activeSubject = index">
                    {{ subject }}
                    <div v-if="activeSubject === index" class="w-4 h-0.5 bg-primary rounded-full"></div>
                </div>
            </div>
        </div>

        <!-- 3. 主内容滚动区域 -->
        <main class="flex-1 overflow-y-auto hide-scrollbar pb-20 relative">

            <!-- 筛选区 -->
            <div class="bg-white/50 backdrop-blur-sm sticky top-0 z-10 px-4 py-3">
                <!-- 版本标签 -->
                <div class="mb-3">
                    <span
                        class="inline-block px-3 py-1 border border-primary text-primary rounded text-xs font-medium bg-blue-50">通用版</span>
                </div>

                <!-- 轮次筛选 -->
                <div class="flex gap-6 text-sm text-gray-600 font-medium">
                    <span class="text-primary font-bold">一轮复习</span>
                    <span>二轮专题复习</span>
                    <span>通用</span>
                </div>
            </div>

            <!-- 课程列表 -->
            <div class="px-3 py-2 space-y-3">
                <div v-for="(course, index) in courses" :key="index"
                    class="bg-white p-3 rounded-lg shadow-sm flex gap-3 active:scale-[0.99] transition-transform">
                    <!-- 封面图 -->
                    <div
                        class="w-[110px] h-[70px] rounded bg-gradient-to-br from-card-orange-start to-card-orange-end flex-none relative overflow-hidden shadow-inner">
                        <!-- 装饰圆弧 -->
                        <div class="absolute bottom-0 w-full h-3 bg-white/20 rounded-t-[100%]"></div>

                        <div class="p-1.5 flex flex-col h-full relative z-10">
                            <div class="flex items-center gap-1 text-[9px] text-white/90 mb-1">
                                <span class="bg-black/10 px-1 rounded">高三</span>
                                <span>语文</span>
                            </div>
                            <div class="text-white text-[11px] leading-tight font-medium mt-auto mb-1">{{ course.tag }}
                            </div>
                        </div>

                        <!-- 装饰图标 -->
                        <div class="absolute right-1 top-1/2 transform -translate-y-1/2 text-white/30 text-3xl">
                            <i class="fas fa-book-open"></i>
                        </div>

                        <!-- 右下角标签 -->
                        <div class="absolute bottom-0 right-0 bg-white/20 text-[8px] text-white px-1 rounded-tl">一轮
                        </div>
                    </div>

                    <!-- 内容 -->
                    <div class="flex flex-col justify-between py-0.5 flex-1">
                        <h3 class="text-[15px] font-bold text-gray-800 leading-snug line-clamp-2">{{ course.title }}
                        </h3>
                        <div class="text-xs text-red-500 font-bold">Test modification</div>
                    </div>
                </div>
            </div>
        </main>

        <!-- 4. 底部导航栏 -->
        <nav class="bg-white border-t border-gray-100 flex justify-around items-center h-[56px] pb-1 flex-none z-20">
            <div class="flex flex-col items-center gap-1 text-primary cursor-pointer">
                <div class="w-8 h-8 bg-blue-50 rounded-full flex items-center justify-center mb-[-2px]">
                    <i class="fas fa-play text-sm"></i>
                </div>
                <span class="text-[10px] font-medium">微课</span>
            </div>

            <div class="flex flex-col items-center gap-1 text-gray-400 cursor-pointer">
                <i class="fas fa-layer-group text-xl mb-0.5"></i>
                <span class="text-[10px] font-medium">资源</span>
            </div>

            <div class="flex flex-col items-center gap-1 text-gray-400 cursor-pointer">
                <i class="far fa-smile text-xl mb-0.5"></i>
                <span class="text-[10px] font-medium">我的</span>
            </div>
        </nav>

        <!-- 5. 模态弹窗 (遮罩层) -->
        <transition name="fade">
            <div v-if="showModal"
                class="absolute inset-0 bg-black/60 z-50 flex items-center justify-center px-6 backdrop-blur-[1px]">
                <!-- 弹窗内容 -->
                <transition name="pop" appear>
                    <div class="bg-white w-full max-w-[360px] rounded-xl shadow-modal overflow-hidden p-5 relative"
                        @click.stop>

                        <!-- 顶部布局：图标 + 标题 -->
                        <div class="flex items-center gap-2 mb-3">
                            <div
                                class="w-8 h-8 bg-blue-50 rounded-full flex-none flex items-center justify-center text-primary text-sm">
                                <i class="fas fa-user-graduate"></i>
                            </div>
                            <h2 class="text-base font-bold text-gray-800">温馨提示</h2>
                        </div>

                        <!-- 文本内容 -->
                        <div class="text-[13px] text-gray-600 leading-relaxed text-justify">
                            <p class="mb-1">你好，当前登录账号为自主注册账号，可查看<span class="font-bold">微课</span>和<span
                                    class="font-bold">资源</span>内容。</p>
                            <p>如需<span class="font-bold">提交作业</span>，<span
                                    class="font-bold">查看错题</span>等学习内容，请联系老师获取<span class="font-bold">校内账号</span>后登录使用。
                            </p>
                        </div>

                        <!-- 按钮 -->
                        <button @click="closeModal"
                            class="w-full mt-4 bg-primary hover:bg-blue-600 text-white text-sm font-medium py-2 rounded-lg transition-colors shadow-lg shadow-blue-500/30 active:scale-[0.98]">
                            我知道了
                        </button>
                    </div>
                </transition>
            </div>
        </transition>

    </div>

    <script>
        const { createApp, ref } = Vue;

        createApp({
            setup() {
                const showModal = ref(true);
                const activeSubject = ref(0);

                const subjects = [
                    '语文', '数学', '英语', '物理', '化学', '生物', '政治', '历史', '地理'
                ];

                const courses = [
                    {
                        tag: '语法讲解',
                        title: '语法讲解 重难点微课',
                        count: 4
                    },
                    {
                        tag: '语病辨析与修改',
                        title: '语病辨析与修改 重难点微课',
                        count: 6
                    },
                    {
                        tag: '语言表达',
                        title: '语言表达 重难点微课',
                        count: 5
                    },
                    {
                        tag: '文言语句翻译',
                        title: '文言语句翻译 重难点微课',
                        count: 4
                    },
                    {
                        tag: '古诗词鉴赏',
                        title: '古诗词鉴赏技巧与实战',
                        count: 8
                    },
                    {
                        tag: '现代文阅读',
                        title: '现代文阅读理解核心方法',
                        count: 5
                    }
                ];

                const closeModal = () => {
                    showModal.value = false;
                };

                return {
                    showModal,
                    closeModal,
                    subjects,
                    activeSubject,
                    courses
                };
            }
        }).mount('#app');
    </script>

    <!-- 页面导航监听器 (由原型生成器自动注入) -->
    <script>
        (function () {
            // 等待 Vue 应用挂载完成
            var checkInterval = setInterval(function () {
                if (window.currentPage) {
                    clearInterval(checkInterval);
                    console.log('[原型] currentPage 已就绪');
                }
            }, 100);

            // 监听来自 viewer 的页面切换消息
            window.addEventListener('message', function (event) {
                if (event.data && event.data.type === 'navigateTo') {
                    var pageName = event.data.page;
                    console.log('[原型] 收到页面切换请求:', pageName);

                    // 使用 window.currentPage (Vue ref)
                    if (window.currentPage && window.currentPage.value !== undefined) {
                        window.currentPage.value = pageName;
                        console.log('[原型] 已切换到页面:', pageName);
                    }

                    // 通知父窗口页面已切换
                    if (window.parent !== window) {
                        window.parent.postMessage({ type: 'pageChange', page: pageName }, '*');
                    }
                }
            });

            // 定期向父窗口报告当前页面
            if (window.parent !== window) {
                setInterval(function () {
                    if (window.currentPage && window.currentPage.value) {
                        window.parent.postMessage({ type: 'pageChange', page: window.currentPage.value }, '*');
                    }
                }, 500);
            }
        })();
    </script>

</body>

</html>
